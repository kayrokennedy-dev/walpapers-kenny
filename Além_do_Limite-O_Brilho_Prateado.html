<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[IMAGE_TITLE]-Download</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      line-height: 1.6;
      background-color: #f4f4f4;
      color: #333;
    }

    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1, h2 {
      text-align: center;
    }

    figure {
      text-align: center;
      margin: 30px 0;
    }

    figure img {
      max-width: 100%;
      height: auto;
      border-radius: 5px;
    }

    figcaption a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background-color: #007BFF;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      transition: background 0.3s;
    }

    figcaption a:hover {
      background-color: #0056b3;
    }

    h3 {
      margin-top: 40px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    ul li {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <main>
    <!-- Main Title -->
    <h1>[CATEGORY] : [SUBCATEGORY]</h1>
    <h2>[IMAGE_TITLE]</h2>

    <!-- Downloadable Image -->
    <figure>
      <img src="[IMAGE_PATH]" alt="[IMAGE_TITLE]">
      <figcaption>
        <a href="[IMAGE_PATH]" download="[IMAGE_FILENAME]" type="application/jpg">
          Download [IMAGE_TITLE]
        </a>
      </figcaption>
    </figure>

    <!-- More Options / Related Downloads -->
    <h3>More Options</h3>
    <ul>
      <li><a href="[RELATED_IMAGE_1_PATH]" download="[RELATED_IMAGE_1_FILENAME]">[RELATED_IMAGE_1_TITLE]</a></li>
      <li><a href="[RELATED_IMAGE_2_PATH]" download="[RELATED_IMAGE_2_FILENAME]">[RELATED_IMAGE_2_TITLE]</a></li>
      <li><a href="[RELATED_IMAGE_3_PATH]" download="[RELATED_IMAGE_3_FILENAME]">[RELATED_IMAGE_3_TITLE]</a></li>
    </ul>
  </main>
</body>
</html>
